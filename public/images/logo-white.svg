<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <defs>
    <linearGradient id="waveGradW" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7CC8D0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4AABB5;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Icon circle background -->
  <circle cx="30" cy="30" r="26" fill="rgba(255,255,255,0.1)"/>

  <!-- Needle body -->
  <line x1="42" y1="10" x2="16" y2="48" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Needle eye -->
  <ellipse cx="40" cy="12.5" rx="3.5" ry="2" transform="rotate(-55 40 12.5)" fill="none" stroke="white" stroke-width="1.6"/>
  <!-- Thread loop -->
  <path d="M38 15 Q28 22 26 30 Q24 38 28 43" fill="none" stroke="url(#waveGradW)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Wave accent -->
  <path d="M14 51 Q20 47 26 51 Q32 55 38 51" fill="none" stroke="url(#waveGradW)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Business name -->
  <text x="64" y="22" font-family="Georgia, serif" font-size="14.5" font-weight="700" fill="white" letter-spacing="0.3">Sea Breeze</text>
  <text x="64" y="38" font-family="Georgia, serif" font-size="14.5" font-weight="700" fill="#7CC8D0" letter-spacing="0.3">Sewing</text>
  <text x="65" y="52" font-family="Arial, sans-serif" font-size="8" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="1.5">BERMUDA · HANDCRAFTED</text>
</svg>
