<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4AABB5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2E8A94;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="threadGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7CC8D0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A8DDE3;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)"/>

  <!-- Needle body -->
  <line x1="44" y1="14" x2="20" y2="50" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Needle eye -->
  <ellipse cx="42" cy="16" rx="4" ry="2.5" transform="rotate(-55 42 16)" fill="none" stroke="white" stroke-width="2"/>
  <!-- Thread loop from eye -->
  <path d="M40 20 Q30 28 28 36 Q26 44 30 48" fill="none" stroke="url(#threadGrad)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Wave accent -->
  <path d="M18 53 Q24 49 30 53 Q36 57 42 53" fill="none" stroke="url(#threadGrad)" stroke-width="2" stroke-linecap="round"/>
</svg>
